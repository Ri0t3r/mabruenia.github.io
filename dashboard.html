<html>
<head>
<title>Citizen Portal</title>
<script src="https://sdk.userbase.com/2/userbase.js"></script>
</head>

<body bgcolor="#C0C0C0">

<h1>Citizen Portal</h1>

<p id="user"></p>

<ul>
<li><a href="military.html">Join the Military</a></li>
<li><a href="applytovote.html">Apply to Vote</a></li>
<li><a href="certificate.html">Citizen Certificate</a></li>
</ul>

<button onclick="logout()">Log Out</button>

<script>
userbase.init({ appId: "939b19a5-62b7-42ea-8c6f-bf936c613615" });

async function init() {
  try {
    const user = await userbase.getCurrentUser();

    if (!user) {
      window.location.href = "login.html";
      return;
    }

    document.getElementById("user").textContent =
      "Logged in as: " + user.username;

  } catch (e) {
    console.log(e);
  }
}

async function logout() {
  await userbase.signOut();
  window.location.href = "login.html";
}

init();
</script>

</body>
</html>
