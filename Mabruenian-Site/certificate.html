<html>
<head>
<title>Citizenship Certificate</title>
<body bgcolor="#C0C0C0" text="#000000" link="#0000FF" vlink="#800080">

<script src="https://sdk.userbase.com/2/userbase.js"></script>
</head>



<center>

<h1>Kingdom of Mabruenia</h1>
<h2>Certificate of Citizenship</h2>

<hr width="60%">

<p id="certificate"></p>

<hr width="60%">

<p>
Issued by the Authority of the Crown<br>
Ministry of The Home Office
</p>

</center>

<br>
<a href="citizen-portal/index.html">Return to Portal</a>

<script>
userbase.init({ appId: "939b19a5-62b7-42ea-8c6f-bf936c613615" });

async function loadCertificate() {
  const user = await userbase.getCurrentUser();

  if (!user) {
    window.location.href = "citizen-portal/login.html";
    return;
  }

  document.getElementById("certificate").innerHTML = `
  This certifies that <b>${user.username}</b><br><br>
  is a recognized citizen of the Kingdom of Mabruenia,<br>
  with all rights and responsibilities therein.<br><br>

  Issued: 2026<br>
  Citizen ID: MAB-${user.username.toUpperCase()}
  `;
}

loadCertificate();
</script>

</body>
</html>
