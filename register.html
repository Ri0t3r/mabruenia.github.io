<html>
<head>
<title>Register</title>
<script src="https://sdk.userbase.com/2/userbase.js"></script>
</head>

<body bgcolor="#C0C0C0">

<h1>Register as Citizen</h1>

<form id="registerForm">
Username:<br>
<input id="username"><br><br>

Password:<br>
<input id="password" type="password"><br><br>

<input type="submit" value="Register">
</form>

<p id="error"></p>

<script>
userbase.init({ appId: "939b19a5-62b7-42ea-8c6f-bf936c613615" });

document.getElementById("registerForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  try {
    await userbase.signUp({
      username: document.getElementById("username").value,
      password: document.getElementById("password").value,
      rememberMe: "local"
    });

    alert("Account created!");
    window.location.href = "login.html";
  } catch (e) {
    document.getElementById("error").textContent = e.message;
  }
});
</script>

<hr>

<h2><b2>Disclaimer</b2></h2>
<p>Use your real name and citizen ID emailed to you when you sign up.</p>

</body>
</html>
