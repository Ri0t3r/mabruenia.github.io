<html>
<head>
<title>Citizen Login</title>
<script src="https://sdk.userbase.com/2/userbase.js"></script>
</head>

<body bgcolor="#C0C0C0">

<h1>Citizen Access Portal</h1>

<form id="loginForm">
Username:<br>
<input id="username"><br><br>

Password:<br>
<input id="password" type="password"><br><br>

<input type="submit" value="Login">
</form>

<p id="error"></p>

<script>
userbase.init({ appId: "939b19a5-62b7-42ea-8c6f-bf936c613615" });

document.getElementById("loginForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  try {
    await userbase.signIn({
      username: document.getElementById("username").value,
      password: document.getElementById("password").value,
    });

    window.location.href = "index.html";
  } catch (e) {
    document.getElementById("error").textContent = e.message;
  }
});
</script>

<hr>

<h2><b2>Disclaimer</b2></h2>
<p>Use your information you provided when you signed up.</p>

</body>
</html>
